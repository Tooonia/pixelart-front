<mat-card class="card-container">
    <mat-card-content>
        <form [formGroup]="managePixelartForm" (ngSubmit)="saveAction()">
            <div class="d-flex">

                <!-- Grid size picker (create mode only, hidden after confirmation) -->
                <div class="gridSizeSettingContainer" #gridSizeSettingContainer *ngIf="gridValidationMode">
                    <h2>Choose Grid Size</h2>
                    <div id="sizePicker">
                        <p>Grid Width (max 128):</p>
                        <input
                            type="number"
                            formControlName="width"
                            id="inputWidth"
                            name="width"
                            min="1"
                            max="128"
                            value="1"
                            pattern="[1-9][0-9]*"
                            (input)="validateIntegerInput($event, 'width')"
                            (keypress)="preventInvalidChars($event)">
                        <p>Grid Height (max 128):</p>
                        <input
                            type="number"
                            formControlName="height"
                            id="inputHeight"
                            name="height"
                            min="1"
                            max="128"
                            value="1"
                            pattern="[1-9][0-9]*"
                            (input)="validateIntegerInput($event, 'height')"
                            (keypress)="preventInvalidChars($event)">
                        <button type="button" (click)="onValidateCanvasSize()">Create Canvas</button>
                    </div>
                </div>


            <!-- Drawing block (shown after canvas is set up) -->
                <div class="pixelDrawingBlockContainer" #pixelDrawingBlockContainer *ngIf="!gridValidationMode">
                    <div>X: {{mousePosition.x}} | y: {{mousePosition.y}}</div>

                    <div class="canvasDiv" #canvasDiv>
                        <canvas
                            id="pixelCanvas"
                            #myCanvas
                            aria-label="Canvas with the pixels to paint"
                            role="img">
                        </canvas>
                    </div>

                    <div class="color-picker-section">
                        <label for="colorPicker" class="labelForColorPicker">Pick a Color:</label>
                        <input type="color" format="'rgb'" id="colorPicker" #myPickedColor>
                    </div>

                    <div>
                        <mat-form-field class="mat-form-field" appearance="outline">
                            <mat-label>Title</mat-label>
                            <input
                                type="text"
                                matInput
                                placeholder="Title of pixelart"
                                formControlName="name"
                                autocomplete="off"
                                required>
                            <mat-error *ngIf="managePixelartForm.get('name')?.hasError('required')">
                                    Title is required
                            </mat-error>
                        </mat-form-field>
                    </div>
                </div>

            </div>

            <!-- Actions (visible once the canvas is ready) -->
            <mat-card-actions class="mat-card-actions d-flex" *ngIf="!gridValidationMode">
                <button type="button" (click)="cancelAction()">Cancel</button>
                <button type="submit" [disabled]="!managePixelartForm.valid">Save</button>
            </mat-card-actions>

        </form>
    </mat-card-content>
</mat-card>
