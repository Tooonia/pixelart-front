<!-- This *ngIf setting prevents the template from attempting to
 red .alias before the HTTP response arrives. -->
<div *ngIf="isSignedin && signedinUser" >
  <!-- TODO: ngFor kell ide? ngFor="signedinUser" works without as well-->

  <p>My email : {{ signedinUser.userEmail }}</p>
  <button (click)="goToMyPortfolio()">See my pixelarts</button>
